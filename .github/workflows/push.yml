on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


name: 🫸 Push Continuous Integration

jobs:

  test:
    name: 🔬 Test Suite
    # Concurrency configuration to cancel previous runs
    concurrency:
      group: ${{ github.ref }}  # Group by branch (ref)
      cancel-in-progress: true  # Cancel previous in-progress workflows

    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Create ui folder
        run: mkdir -p ui/dist
      - name: Run Main Tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --package data-tracks
      - name: Run Value Tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --package value